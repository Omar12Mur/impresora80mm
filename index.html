<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impresor Bluetooth - La Villa</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { 
            background: #007bff; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; margin-top: 10px;
        }
        .status { margin-top: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h3>Impresión Bluetooth (80mm)</h3>
    <p>Conéctate a la impresora térmica para imprimir el pedido.</p>
    
    <button class="btn" onclick="conectarYImprimir()">CONECTAR Y IMPRIMIR</button>
    <div id="status" class="status">Estado: Desconectado</div>
</div>

<script>
// Comandos ESC/POS para impresoras térmicas
const ESC = '\x1B';
const GS = '\x1D';
const INIT = ESC + '@';
const BOLD_ON = ESC + 'E' + '\x01';
const BOLD_OFF = ESC + 'E' + '\x00';
const CENTER = ESC + 'a' + '\x01';

async function conectarYImprimir() {
    const status = document.getElementById('status');
    
    try {
        status.innerText = "Buscando impresora...";
        
        // 1. Pedir permiso para conectar por Bluetooth
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }], // UUID estándar de impresoras chinas
            optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

        status.innerText = "Imprimiendo...";

        // 2. Formatear el ticket para 80mm
        let ticket = INIT + CENTER + BOLD_ON + "COMESTIBLES LA VILLA S.A.S.\n" + BOLD_OFF;
        ticket += "NIT 900.755.203-3\n";
        ticket += "--------------------------------\n"; // 32-42 caracteres para 80mm
        ticket += "PRODUCTO          CANT   TOTAL\n";
        ticket += "UVA X 200 G        3    12.450\n";
        ticket += "COCO X 50 G        5    10.749\n";
        ticket += "--------------------------------\n";
        ticket += BOLD_ON + "TOTAL: $23.199\n" + BOLD_OFF;
        ticket += "\n\n\n"; // Espacio para el corte

        // 3. Enviar a la impresora
        const encoder = new TextEncoder();
        const data = encoder.encode(ticket);
        await characteristic.writeValue(data);

        status.innerText = "¡Impresión exitosa!";
        await device.gatt.disconnect();

    } catch (error) {
        console.error(error);
        status.innerText = "Error: " + error.message;
    }
}
</script>
</body>
</html>
