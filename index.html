<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impresión Dinámica La Villa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #eceff1; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #1a73e8; margin-bottom: 5px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn:disabled { background: #ccc; }
        #status { margin-top: 20px; font-size: 13px; font-weight: bold; padding: 10px; border-radius: 5px; }
        input[type="file"] { margin: 15px 0; font-size: 14px; }
        .info-factura { text-align: left; background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>La Villa: Impresora 80mm</h2>
    <p style="font-size: 14px; color: #666;">Carga el PDF de Siigo y presiona imprimir</p>
    
    <input type="file" id="pdfInput" accept="application/pdf">
    
    <div id="infoFactura" class="info-factura"></div>

    <button id="btnImprimir" class="btn" onclick="procesarEImprimir()">CONECTAR E IMPRIMIR</button>
    
    <div id="status">Estado: Esperando archivo...</div>
</div>

<script>
// Configuración de PDF.js
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function procesarEImprimir() {
    const fileInput = document.getElementById('pdfInput');
    const status = document.getElementById('status');
    const infoDiv = document.getElementById('infoFactura');
    
    if (fileInput.files.length === 0) {
        status.style.color = "orange";
        status.innerText = "⚠️ Por favor, selecciona un PDF primero.";
        return;
    }

    try {
        status.innerText = "🔍 Analizando contenido del PDF...";
        const file = fileInput.files[0];
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        
        let textFull = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            textFull += content.items.map(item => item.str).join(" ") + " ";
        }

        // --- LÓGICA DE EXTRACCIÓN DINÁMICA ---
        // Extrae el número de factura (Ej: CV 20802)
        const nroFactura = textFull.match(/No\.\s*(CV\s*\d+)/i)?.[1] || "S/N";
        // Extrae el cliente (Texto entre 'Cliente' y 'Nit / C.C.')
        const cliente = textFull.match(/Cliente\s+(.*?)\s+Nit/i)?.[1] || "Consumidor Final";
        // Extrae el total final (Busca 'Total' seguido de precio)
        const total = textFull.match(/Total\s+([\d.,]+)/i)?.[1] || "0.00";

        // Mostrar datos encontrados para confirmación del usuario
        infoDiv.style.display = "block";
        infoDiv.innerHTML = `<b>Factura:</b> ${nroFactura}<br><b>Cliente:</b> ${cliente}<br><b>Total:</b> $${total}`;

        status.innerText = "🌐 Buscando impresora Bluetooth...";

        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        const char = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

        // --- COMANDOS ESC/POS PARA 80mm ---
        const INIT = '\x1B@';
        const CENTER = '\x1Ba\x01';
        const LEFT = '\x1Ba\x00';
        const BOLD_ON = '\x1BE\x01';
        const BOLD_OFF = '\x1BE\x00';
        const LINE = "------------------------------------------\n"; // 42 caracteres para 80mm

        let ticket = INIT + CENTER + BOLD_ON + "COMESTIBLES LA VILLA S.A.S.\n" + BOLD_OFF;
        ticket += "NIT: 900.755.203-3\n";
        ticket += LINE;
        ticket += LEFT + "FACTURA: " + nroFactura + "\n";
        ticket += "CLIENTE: " + cliente.substring(0, 30) + "\n";
        ticket += LINE;
        ticket += CENTER + BOLD_ON + "TOTAL A PAGAR: $" + total + "\n" + BOLD_OFF;
        ticket += LINE;
        ticket += CENTER + "¡Gracias por su compra!\n\n\n\n\n";

        await char.writeValue(new TextEncoder().encode(ticket));
        
        status.style.color = "green";
        status.innerText = "✅ ¡Factura impresa con éxito!";
        
        setTimeout(() => device.gatt.disconnect(), 2000);

    } catch (error) {
        status.style.color = "red";
        status.innerText = "❌ Error: " + error.message;
        console.error(error);
    }
}
</script>

</body>
</html>
