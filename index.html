<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Factura a Ticket 80mm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
background:#f0f0f0;
font-family:"Courier New", monospace;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.ticket{
width:80mm;
max-width:80mm;
box-sizing:border-box;
background:white;
padding:4mm;
font-size:11px;
line-height:1.25;
}

.center{text-align:center;}

.divider{
border-top:1px dashed black;
margin:6px 0;
}

.row{
display:flex;
justify-content:space-between;
gap:4px;
}

.row span:first-child{
max-width:55mm;
word-break:break-word;
}

.row span:last-child{
text-align:right;
min-width:18mm;
}

button{
margin-top:10px;
padding:10px;
width:100%;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h3>Factura → Ticket 80mm</h3>

<input type="file" id="pdfInput" accept="application/pdf">

<button onclick="procesarPDF()">Leer factura</button>
<button onclick="generarPDF()">Descargar PDF</button>
<button onclick="imprimirTicket()">Imprimir Ticket</button>
<button onclick="imprimirBluetooth()">Bluetooth</button>

<!-- 🔥 TEST JS -->
<button onclick="alert('JS FUNCIONA OK')">
TEST JAVASCRIPT
</button>

<!-- 🔥 ANDROID SEGURO -->
<button onclick="try{ Android.imprimir('PRUEBA REAL POS'); }catch(e){ alert('ERROR ANDROID: ' + e); }">
IMPRIMIR ANDROID
</button>

<div id="ticket" class="ticket"></div>

</div>

<script>

let textoBluetooth = "";
let cufe = "";

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function procesarPDF(){

try{

const file=document.getElementById("pdfInput").files[0];
if(!file){ alert("Selecciona un PDF"); return; }

const reader=new FileReader();

reader.onload=async function(){

const typedarray=new Uint8Array(this.result);

const pdf=await pdfjsLib.getDocument(typedarray).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i);
const content=await page.getTextContent();

text+=content.items.map(item=>item.str).join(" ")+" ";
}

extraerDatos(text);
};

reader.readAsArrayBuffer(file);

}catch(e){
alert("Error PDF: " + e);
}

}

function extraerDatos(text){

textoBluetooth = ""; // 🔥 reset importante

const factura=text.match(/CV\s*\d+/)?.[0]||"";
const fecha=text.match(/\d{4}-\d{2}-\d{2}/)?.[0]||"";
const cliente=text.match(/Cliente\s+(.*?)\s+Nit/i)?.[1]||"";
const nit=text.match(/Nit\s*\/\s*C\.C\.\s*([\d\.\-]+)/)?.[1]||"";
const total=text.match(/Total\s+([\d.,]+)/)?.[1]||"";

cufe=text.match(/CUFE:\s*([a-f0-9]+)/i)?.[1]||"";

const regex=/([A-Z\s\+X0-9]{4,40})\s+(\d+\.\d{2})\s+\d+\s?%\s+[\d.,]+\s+([\d.,]+)/g;

let productos="";
let match;

while((match=regex.exec(text))!==null){

productos+=`
<div class="row">
<span>${match[1]} (${match[2]})</span>
<span>$${match[3]}</span>
</div>
`;

textoBluetooth += `${match[1]} (${match[2]}) $${match[3]}\n`;
}

document.getElementById("ticket").innerHTML=`
<div class="center">
<b>COMESTIBLES LA VILLA S.A.S</b><br>
NIT 900.755.203-3
</div>

<div class="divider"></div>

Factura: ${factura}<br>
Fecha: ${fecha}<br>
Cliente: ${cliente}<br>
NIT: ${nit}

<div class="divider"></div>

${productos}

<div class="divider"></div>

<div class="row"><span>TOTAL</span><span>$${total}</span></div>

<div class="divider"></div>

<div class="qr" id="qrcode"></div>

<div class="center">CUFE<br>${cufe}</div>

`;

if(cufe){
new QRCode(document.getElementById("qrcode"),{
text:"https://catalogo-vpfe.dian.gov.co/document/searchqr?documentKey="+cufe,
width:120,
height:120
});
}

}

function generarPDF(){
const element=document.getElementById("ticket");
if(!element){ alert("No hay ticket"); return; }

const alturaPx=element.offsetHeight;
const alturaMM=alturaPx*0.264583;

html2pdf().set({
margin:0,
filename:"ticket_80mm.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{scale:2},
jsPDF:{
unit:"mm",
format:[80,alturaMM],
orientation:"portrait"
}
}).from(element).save();
}

function imprimirTicket(){
window.print();
}

async function imprimirBluetooth(){

try{

const device = await navigator.bluetooth.requestDevice({
acceptAllDevices:true,
optionalServices:[0xFFE0]
});

const server = await device.gatt.connect();
const service = await server.getPrimaryService(0xFFE0);
const characteristic = await service.getCharacteristic(0xFFE1);

let encoder = new TextEncoder();
let data = encoder.encode(textoBluetooth);

await characteristic.writeValue(data);

alert("Ticket enviado OK");

}catch(error){
alert("Bluetooth error: "+error);
}

}

</script>

</body>
</html>
